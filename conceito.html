<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoMística — Conceito</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }
    body {
      background-image: url('imagens/turismo.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      color: white;
    }
    /* camada translúcida mais intensa para páginas internas */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 40, 15, 0.6);  /* mais opacidade para destacar texto */
      z-index: 0;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      display: flex;
      align-items: center;
      padding: 0 80px;
      background: transparent;
      z-index: 10;
    }
    header img {
      height: 80px;
      z-index: 10;
      cursor: pointer;
    }
    .voltar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 11;
    }
    .voltar a {
      text-decoration: none;
      color: white;
      font-size: 24px;
      font-weight: bold;
      background-color: rgba(255,255,255,0.2);
      padding: 8px 12px;
      border-radius: 8px;
      transition: 0.3s;
    }
    .voltar a:hover {
      background-color: rgba(255,255,255,0.4);
    }
    .conteudo {
      position: relative;
      z-index: 1;
      padding: 140px 20px 40px;
      max-width: 800px;
      margin: 0 auto;
      color: white;
    }
    .conteudo h1 {
      margin-bottom: 20px;
      font-size: 48px;
    }
    .conteudo p {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      header {
        padding: 10px;
      }
      header img {
        height: 60px;
      }
      .conteudo h1 {
        font-size: 36px;
      }
      .conteudo p {
        font-size: 18px;
      }
      .voltar a {
        font-size: 20px;
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html"><img src="imagens/logo.png" alt="Logo EcoMística"></a>
  </header>

  <div class="voltar">
    <a href="index.html">&larr; Voltar</a>
  </div>

  <div class="conteudo">
    <h1>Conceito</h1>
    <p>
      Aqui você coloca o conteúdo da página “Conceito”. Fale do conceito do seu projeto, sua missão, visão, valores...
    </p>
    <p>
      Pode incluir imagens, textos, qualquer coisa que quiser, dentro dessa área de “conteúdo”.
    </p>
  </div>
</body>
</html>
